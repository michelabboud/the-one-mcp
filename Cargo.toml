[workspace]
members = [
    "crates/the-one-claude",
    "crates/the-one-codex",
    "crates/the-one-core",
    "crates/the-one-mcp",
    "crates/the-one-memory",
    "crates/the-one-registry",
    "crates/the-one-router",
    "crates/the-one-ui",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "Apache-2.0"
repository = "https://example.invalid/the-one-mcp"
version = "0.1.0"

[workspace.dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0"
tokio = { version = "1", features = ["macros", "rt", "rt-multi-thread", "net", "signal", "sync", "io-util", "io-std", "process"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
fastembed = "4"
async-trait = "0.1"
clap = { version = "4", features = ["derive"] }
