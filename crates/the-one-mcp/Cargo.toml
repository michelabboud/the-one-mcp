[package]
name = "the-one-mcp"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = ["embed-swagger", "local-embeddings"]
embed-swagger = []
local-embeddings = ["the-one-memory/local-embeddings"]

[[bin]]
name = "the-one-mcp"
path = "src/bin/the-one-mcp.rs"

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
axum = "0.8"
clap.workspace = true
serde.workspace = true
serde_json.workspace = true
the-one-core = { path = "../the-one-core" }
the-one-memory = { path = "../the-one-memory", default-features = false }
the-one-registry = { path = "../the-one-registry" }
the-one-router = { path = "../the-one-router" }
tokio.workspace = true
tokio-stream = { version = "0.1", features = ["sync"] }
tracing.workspace = true

[dev-dependencies]
tempfile = "3.27"
