name: release

# Manual trigger only — you decide when to build release artifacts.
# Use: gh workflow run release.yml -f tag=v0.4.0
# Or: GitHub Actions UI → release → Run workflow
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release (e.g., v0.4.0). Creates tag if it doesn't exist."
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: echo "version=$INPUT_TAG" >> "$GITHUB_OUTPUT"

      - name: Print version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: echo "Building release $VERSION"

      - uses: dtolnay/rust-toolchain@stable
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Tests
        run: cargo test --workspace

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-x86_64
            cross: false
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-aarch64
            cross: true
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            name: macos-x86_64
            cross: false
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-aarch64
            cross: false
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-x86_64
            cross: false
            ext: .exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            name: windows-aarch64
            cross: false
            ext: .exe

    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      TARGET: ${{ matrix.target }}
      PLATFORM_NAME: ${{ matrix.name }}
      EXT: ${{ matrix.ext }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: |
          curl -fsSL https://github.com/cross-rs/cross/releases/latest/download/cross-x86_64-unknown-linux-gnu.tar.gz | tar xz -C /usr/local/bin
          cross --version

      - name: Build MCP server (with swagger)
        shell: bash
        run: |
          BUILD_CMD="${{ matrix.cross && 'cross' || 'cargo' }}"
          $BUILD_CMD build --release --target "$TARGET" -p the-one-mcp --bin the-one-mcp

      - name: Build MCP server (lean)
        shell: bash
        run: |
          BUILD_CMD="${{ matrix.cross && 'cross' || 'cargo' }}"
          $BUILD_CMD build --release --target "$TARGET" -p the-one-mcp --bin the-one-mcp --no-default-features
          cp "target/${TARGET}/release/the-one-mcp${EXT}" \
             "target/${TARGET}/release/the-one-mcp-lean${EXT}"

      - name: Rebuild MCP server (with swagger)
        shell: bash
        run: |
          BUILD_CMD="${{ matrix.cross && 'cross' || 'cargo' }}"
          $BUILD_CMD build --release --target "$TARGET" -p the-one-mcp --bin the-one-mcp

      - name: Build embedded UI
        shell: bash
        run: |
          BUILD_CMD="${{ matrix.cross && 'cross' || 'cargo' }}"
          $BUILD_CMD build --release --target "$TARGET" -p the-one-ui --bin embedded-ui

      - name: Package artifacts
        shell: bash
        run: |
          PKG="the-one-mcp-${VERSION}-${PLATFORM_NAME}"
          DIST="dist/${PKG}"
          mkdir -p "$DIST"
          cp "target/${TARGET}/release/the-one-mcp${EXT}"      "$DIST/the-one-mcp${EXT}"
          cp "target/${TARGET}/release/the-one-mcp-lean${EXT}" "$DIST/the-one-mcp-lean${EXT}"
          cp "target/${TARGET}/release/embedded-ui${EXT}"      "$DIST/embedded-ui${EXT}"
          cp -r schemas "$DIST/"
          cat > "$DIST/BUILD_INFO" <<BUILDEOF
          version=${VERSION}
          target=${TARGET}
          build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          git_commit=$(git rev-parse --short HEAD)
          rustc_version=$(rustc --version)
          BUILDEOF
          cd dist
          if [[ "${PLATFORM_NAME}" == windows-* ]]; then
            7z a -tzip "${PKG}.zip" "${PKG}"
          else
            tar -czf "${PKG}.tar.gz" "${PKG}"
          fi

      - name: Binary sizes
        shell: bash
        run: |
          echo "=== ${PLATFORM_NAME} ==="
          ls -lh "dist/the-one-mcp-${VERSION}-${PLATFORM_NAME}/the-one-mcp${EXT}"
          ls -lh "dist/the-one-mcp-${VERSION}-${PLATFORM_NAME}/the-one-mcp-lean${EXT}"
          ls -lh "dist/the-one-mcp-${VERSION}-${PLATFORM_NAME}/embedded-ui${EXT}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: the-one-mcp-${{ matrix.name }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          retention-days: 30

  release:
    needs: [validate, build]
    runs-on: ubuntu-latest
    if: always() && needs.validate.result == 'success'
    env:
      VERSION: ${{ needs.validate.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Create tag if needed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists"
          else
            git tag -a "$VERSION" -m "Release $VERSION"
            git push origin "$VERSION"
            echo "Created tag $VERSION"
          fi

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-assets/ \;
          echo "=== Release assets ==="
          ls -lh release-assets/ || echo "No assets"

      - name: Generate checksums
        working-directory: release-assets
        run: |
          if compgen -G "*.tar.gz" >/dev/null || compgen -G "*.zip" >/dev/null; then
            sha256sum * > SHA256SUMS.txt
            cat SHA256SUMS.txt
          else
            echo "No artifacts to checksum"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if echo "$VERSION" | grep -qE "beta|rc|alpha"; then
            PRERELEASE_FLAG="--prerelease"
          fi

          if compgen -G "release-assets/*.tar.gz" >/dev/null || compgen -G "release-assets/*.zip" >/dev/null; then
            gh release create "$VERSION" \
              --title "the-one-mcp $VERSION" \
              --generate-notes \
              $PRERELEASE_FLAG \
              release-assets/*
          else
            gh release create "$VERSION" \
              --title "the-one-mcp $VERSION" \
              --generate-notes \
              --notes "Release created but build artifacts unavailable." \
              $PRERELEASE_FLAG
          fi
